<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ko' }}" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  {% seo %}

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=Spectral:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">

  <!-- Highlight.js -->
  <link id="hljs-light" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <link id="hljs-dark"  rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" disabled>

  <!-- Main CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <!-- Dark mode: apply before render to avoid flash -->
  <script>
    (function(){
      var t = localStorage.getItem('theme');
      if(t) document.documentElement.dataset.theme = t;
      var l = document.getElementById('hljs-light');
      var d = document.getElementById('hljs-dark');
      if(t==='dark'){ if(l) l.disabled=true; if(d) d.disabled=false; }
    })();
  </script>
</head>
<body>

<div class="site-wrap">

  <!-- ── Sidebar ── -->
  {% include sidebar.html %}

  <!-- ── Main ── -->
  <main class="main">
    {{ content }}
  </main>

</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js" defer
  onload="renderMathInElement(document.body, {
    delimiters: [
      { left: '$$', right: '$$', display: true  },
      { left: '\\[', right: '\\]', display: true  },
      { left: '$', right: '$', display: false }
    ],
    throwOnError: false,
    strict: false,
    trust: true,
    ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
  });"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" defer></script>
<script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>

</body>
</html>
